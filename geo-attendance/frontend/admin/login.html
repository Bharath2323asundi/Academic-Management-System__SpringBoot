<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Admin Login — GeoAttend</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .role-badge {
      display: inline-block;
      background: rgba(15,76,129,0.1);
      color: var(--primary);
      font-size: 0.78rem;
      font-weight: 700;
      padding: 3px 12px;
      border-radius: 20px;
      letter-spacing: 0.08em;
      text-transform: uppercase;
      margin-bottom: 8px;
    }
    .demo-hint {
      background: var(--bg);
      border-radius: 8px;
      padding: 10px 14px;
      font-size: 0.82rem;
      color: var(--text-muted);
      margin-bottom: 18px;
      border: 1px dashed var(--border);
    }
    .demo-hint strong { color: var(--primary); }
  </style>
</head>
<body>
<div class="auth-page">
  <div class="auth-card">
    <div class="auth-logo">
      <div class="auth-logo-icon">📍</div>
      <span class="role-badge">Admin Portal</span>
      <h1>GeoAttend</h1>
      <p>Geo-Fencing Attendance System</p>
    </div>

    <div class="demo-hint">
      🔑 Default credentials: <strong>admin</strong> / <strong>admin123</strong>
    </div>

    <div id="alert" class="alert hidden"></div>

    <form id="loginForm">
      <div class="form-group">
        <label class="form-label">Username</label>
        <input type="text" id="username" class="form-control" placeholder="Enter admin username" value="admin" required />
      </div>
      <div class="form-group">
        <label class="form-label">Password</label>
        <input type="password" id="password" class="form-control" placeholder="Enter password" value="admin123" required />
      </div>
      <button type="submit" id="loginBtn" class="btn btn-primary btn-full btn-lg mt-3">
        🔐 Login as Admin
      </button>
    </form>

    <div class="auth-footer-link mt-3">
      <a href="../student/login.html">Switch to Student Portal →</a>
    </div>
  </div>
</div>

<script src="../assets/js/main.js"></script>
<script>
  // Redirect if already logged in as admin
  if (Auth.getToken() && Auth.getRole() === 'ADMIN') {
    window.location.href = 'dashboard.html';
  }

  document.getElementById('loginForm').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('loginBtn');
    const alert = document.getElementById('alert');
    UI.hideAlert(alert);
    UI.setLoading(btn, true);

    const res = await api.post('/auth/admin/login', {
      username: document.getElementById('username').value.trim(),
      password: document.getElementById('password').value
    });

    UI.setLoading(btn, false);

    if (res.ok) {
      Auth.setSession(res.data);
      window.location.href = 'dashboard.html';
    } else {
      UI.showAlert(alert, res.data.message || 'Login failed', 'danger');
    }
  });
</script>
</body>
</html>
