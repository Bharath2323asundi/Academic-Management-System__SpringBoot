<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Attendance Records — GeoAttend</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .filter-bar {
      display: flex; gap: 12px; align-items: flex-end; flex-wrap: wrap;
      margin-bottom: 24px;
    }
    .filter-bar .form-group { margin-bottom: 0; }
    .summary-row {
      display: flex; gap: 16px; margin-bottom: 20px; flex-wrap: wrap;
    }
    .summary-chip {
      display: flex; align-items: center; gap: 8px;
      background: #fff; border: 1px solid var(--border);
      border-radius: 20px; padding: 6px 16px; font-size: 0.88rem; font-weight: 600;
    }
    .summary-chip .dot {
      width: 8px; height: 8px; border-radius: 50%;
    }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-wrapper">
  <div class="container">
    <div class="page-header">
      <h2>📋 Attendance Records</h2>
      <p>View and filter attendance by date</p>
    </div>

    <div class="card">
      <div class="filter-bar">
        <div class="form-group">
          <label class="form-label">Select Date</label>
          <input type="date" id="dateFilter" class="form-control" style="width:200px" />
        </div>
        <button class="btn btn-primary" onclick="loadByDate()">🔍 View Records</button>
        <button class="btn btn-outline" onclick="loadToday()">📅 Today</button>
      </div>

      <div class="summary-row" id="summaryRow"></div>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Student Name</th>
              <th>Student ID</th>
              <th>Time Marked</th>
              <th>Distance (m)</th>
              <th>Status</th>
            </tr>
          </thead>
          <tbody id="attendanceTable">
            <tr><td colspan="6" class="text-center text-muted" style="padding:28px">Select a date to view records</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="../assets/js/main.js"></script>
<script>
  document.getElementById('navbar-placeholder').innerHTML = buildNavbar('ADMIN');
  document.getElementById('footer-placeholder').innerHTML = buildFooter();
  if (!initPage('ADMIN')) throw '';

  function loadToday() {
    const today = new Date().toISOString().split('T')[0];
    document.getElementById('dateFilter').value = today;
    loadByDate();
  }

  async function loadByDate() {
    const date = document.getElementById('dateFilter').value;
    if (!date) return;

    const res = await api.get(`/admin/attendance/date/${date}`);
    if (!res.ok) { renderTable([]); return; }

    const records = res.data;
    const present = records.filter(r => r.status === 'present').length;
    const total   = records.length;

    document.getElementById('summaryRow').innerHTML = `
      <div class="summary-chip"><span class="dot" style="background:var(--primary)"></span>Total Marked: <strong>${total}</strong></div>
      <div class="summary-chip"><span class="dot" style="background:var(--success)"></span>Present: <strong>${present}</strong></div>
      <div class="summary-chip"><span class="dot" style="background:var(--accent)"></span>
        Rate: <strong>${total > 0 ? Math.round(present*100/total) : 0}%</strong>
      </div>`;

    renderTable(records);
  }

  function renderTable(records) {
    const tbody = document.getElementById('attendanceTable');
    if (!records.length) {
      tbody.innerHTML = `<tr><td colspan="6" class="text-center text-muted" style="padding:28px">No attendance records for this date</td></tr>`;
      return;
    }
    tbody.innerHTML = records.map((r, i) => `
      <tr>
        <td>${i + 1}</td>
        <td><strong>${r.studentName}</strong></td>
        <td><code>${r.studentId}</code></td>
        <td>${UI.formatTime(r.time)}</td>
        <td>${r.distance || 0} m</td>
        <td>${UI.badgeStatus(r.status)}</td>
      </tr>`).join('');
  }

  document.getElementById('dateFilter').value = new Date().toISOString().split('T')[0];
  loadToday();
</script>
</body>
</html>
