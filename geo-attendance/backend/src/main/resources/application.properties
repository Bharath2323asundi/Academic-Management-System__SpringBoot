# ============================================
# Geo-Attendance System - Application Config
# ============================================

# Server
server.port=${PORT:8080}

# Database (XAMPP MySQL or Production)
spring.datasource.url=${DB_URL:jdbc:mysql://localhost:3306/geo_attendance?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true}
spring.datasource.username=${DB_USER:root}
spring.datasource.password=${DB_PASS:}
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# JPA/Hibernate
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect

# JWT
jwt.secret=${JWT_SECRET:geo_attendance_super_secret_key_2024_minimum_256_bits_required_for_hmac}
jwt.expiration=86400000

# CORS
app.cors.allowed-origins=${CORS_ORIGINS:http://localhost:3000,http://localhost:8080,http://127.0.0.1:5500}

# Logging
logging.level.com.geoattendance=INFO
logging.level.org.springframework.security=WARN
