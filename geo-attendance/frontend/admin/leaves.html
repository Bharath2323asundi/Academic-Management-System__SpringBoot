<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Leave Requests — GeoAttend</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn {
      padding: 8px 20px; border-radius: 8px; font-size: 0.88rem;
      font-weight: 600; cursor: pointer; border: 1.5px solid var(--border);
      background: #fff; color: var(--text-muted); transition: all 0.18s;
    }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .action-btns { display: flex; gap: 6px; }
    .remark-input { padding: 4px; border: 1px solid var(--border); border-radius: 4px; font-size: 0.8rem; width: 120px; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-wrapper">
  <div class="container">
    <div class="page-header">
      <h2>🏖️ Leave Requests</h2>
      <p>Approve or reject student leave applications</p>
    </div>

    <div id="alertBox" class="alert hidden"></div>

    <div class="card">
      <div class="card-header">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('pending', this)">⏳ Pending</button>
          <button class="tab-btn" onclick="switchTab('all', this)">All Leaves</button>
        </div>
      </div>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>Student</th>
              <th>Date Range</th>
              <th>Reason</th>
              <th>Status</th>
              <th>Action/Remarks</th>
            </tr>
          </thead>
          <tbody id="leavesTable">
            <tr><td colspan="5" class="text-center text-muted" style="padding:28px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="../assets/js/main.js"></script>
<script>
  document.getElementById('navbar-placeholder').innerHTML = buildNavbar('ADMIN');
  document.getElementById('footer-placeholder').innerHTML = buildFooter();
  if (!initPage('ADMIN')) throw '';

  let allLeaves = [];
  let currentTab = 'pending';

  async function loadLeaves() {
    const res = await api.get('/admin/leaves');
    if (!res.ok) return;
    allLeaves = res.data;
    filterTable();
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterTable();
  }

  function filterTable() {
    let filtered = allLeaves;
    if (currentTab === 'pending') {
      filtered = filtered.filter(l => l.status === 'pending');
    }
    renderTable(filtered);
  }

  function renderTable(leaves) {
    const tbody = document.getElementById('leavesTable');
    if (!leaves.length) {
      tbody.innerHTML = `<tr><td colspan="5" class="text-center text-muted" style="padding:28px">No ${currentTab} leave requests found.</td></tr>`;
      return;
    }

    tbody.innerHTML = leaves.map(l => {
      const start = UI.formatDate(l.startDate);
      const end = l.startDate === l.endDate ? '' : ` - ${UI.formatDate(l.endDate)}`;
      
      let actionHtml = '';
      if (l.status === 'pending') {
        actionHtml = `
          <div style="display:flex; flex-direction:column; gap:4px">
            <input type="text" id="remark-${l.id}" class="remark-input" placeholder="Admin remarks..." />
            <div class="action-btns">
              <button class="btn btn-success btn-sm" onclick="updateStatus(${l.id}, 'approved')">Approve</button>
              <button class="btn btn-danger btn-sm" onclick="updateStatus(${l.id}, 'rejected')">Reject</button>
            </div>
          </div>
        `;
      } else {
        actionHtml = `<span style="font-size: 0.85rem; color: #666">${l.adminRemarks || 'No remarks'}</span>`;
      }

      return `
        <tr>
          <td>
            <strong>${l.studentName}</strong><br/>
            <small class="text-muted">ID: ${l.studentId}</small>
          </td>
          <td style="white-space:nowrap">${start}${end}</td>
          <td style="max-width:200px; white-space:normal">${l.reason}</td>
          <td>${UI.badgeStatus(l.status)}</td>
          <td>${actionHtml}</td>
        </tr>`;
    }).join('');
  }

  async function updateStatus(id, status) {
    const alertBox = document.getElementById('alertBox');
    const remarks = document.getElementById(`remark-${id}`)?.value || '';

    const res = await api.put(`/admin/leaves/${id}/status`, { status, adminRemarks: remarks });
    if (res.ok) {
      UI.showAlert(alertBox, `Leave ${status} successfully!`, 'success');
      loadLeaves();
    } else {
      UI.showAlert(alertBox, res.data.message || 'Update failed', 'danger');
    }
  }

  loadLeaves();
</script>
</body>
</html>
