<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Teacher Dashboard | Geo-Attendance</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/app.js" defer></script>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-2"></div>
        <div class="blob blob-3"></div>
    </div>

    <div class="container">
        <nav class="navbar">
            <div class="logo">
                <span class="gradient-text">Teacher Portal</span>
            </div>
            <div style="display: flex; align-items: center; gap: 1rem;">
                <span id="nav-username" style="color: var(--text-muted); font-size: 0.9rem;">Teacher Name</span>
                <button onclick="app.logout()" class="btn btn-logout">Logout</button>
            </div>
        </nav>

        <div class="grid grid-2">
            <!-- Session Controls -->
            <div class="glass-card">
                <h2>Attendance Session</h2>
                <div id="session-inactive">
                    <p style="color: var(--text-muted); margin-bottom: 1.5rem;">Start a new session to allow students to mark attendance.</p>
                    <div class="input-group">
                        <label>Subject Name</label>
                        <input type="text" id="session-subject" placeholder="Maths-101 (Section A)">
                    </div>
                    <button id="btn-start" class="btn btn-primary" style="width: 100%;">Start Session</button>
                </div>

                <div id="session-active" style="display: none; text-align: center;">
                    <h3 id="active-subject" class="gradient-text" style="font-size: 1.5rem; margin-bottom: 1rem;">Subject</h3>
                    <div id="qr-container" style="background: white; padding: 1rem; border-radius: 12px; display: inline-block; margin-bottom: 1rem;">
                        <img id="qr-image" src="" alt="QR Code" style="max-width: 250px;">
                    </div>
                    <div style="margin-bottom: 1rem;">
                        <span style="color: var(--text-muted); font-size: 0.8rem;">Manual Entry Token:</span>
                        <h4 id="display-token" style="color: var(--primary); font-family: monospace; letter-spacing: 2px; margin-top: 0.2rem;">----</h4>
                    </div>
                    <p style="color: var(--secondary); font-weight: 600; margin-bottom: 1rem;">Expires in 10 minutes</p>
                    <div style="background: rgba(16,185,129,0.1); padding: 1rem; border-radius: 12px; margin-bottom: 1.5rem;">
                        <span style="display: block; font-size: 0.8rem; color: var(--accent); text-transform: uppercase;">Students Present</span>
                        <h2 id="live-count" style="font-size: 3rem; color: var(--accent);">0</h2>
                    </div>
                    <button id="btn-end" class="btn btn-secondary" style="width: 100%; border-color: var(--secondary); color: var(--secondary);">End Session Manually</button>
                </div>
            </div>

            <!-- Student Approvals -->
            <div class="glass-card">
                <h2>Pending Approvals</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">Review student registration requests.</p>
                <div id="pending-list" style="max-height: 400px; overflow-y: auto;">
                    <!-- List items here -->
                </div>
            </div>
        </div>

        <!-- Session History -->
        <div class="glass-card" style="margin-top: 2rem;">
            <h2>Recent Sessions</h2>
            <div style="overflow-x: auto; margin-top: 1rem;">
                <table style="width: 100%; border-collapse: collapse;">
                    <thead>
                        <tr style="border-bottom: 1px solid var(--glass-border); text-align: left;">
                            <th style="padding: 1rem 0;">Subject</th>
                            <th style="padding: 1rem 0;">Date & Time</th>
                            <th style="padding: 1rem 0;">Status</th>
                            <th style="padding: 1rem 0; text-align: right;">Report</th>
                        </tr>
                    </thead>
                    <tbody id="history-table">
                        <!-- History loaded here -->
                    </tbody>
                </table>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let currentSessionId = null;
        let statsInterval = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!app.user || !app.user.roles.includes('ROLE_TEACHER')) {
                window.location.href = 'auth.html';
            }
            loadPendingStudents();
            // loadHistory(); // Implement if needed
            
            document.getElementById('btn-start').onclick = startSession;
            document.getElementById('btn-end').onclick = endSession;
        });

        async function loadPendingStudents() {
            const list = document.getElementById('pending-list');
            try {
                const students = await app.request('/teacher/pending-students');
                if (students.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No pending approvals.</p>';
                    return;
                }
                list.innerHTML = '';
                students.forEach(s => {
                    const div = document.createElement('div');
                    div.className = 'glass-card';
                    div.style.padding = '1rem';
                    div.style.marginBottom = '1rem';
                    div.style.background = 'rgba(255,255,255,0.03)';
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h4 style="margin: 0;">${s.user.name}</h4>
                                <small style="color: var(--text-muted)">${s.vtuNo} | ${s.branch} Sem ${s.semester}</small>
                            </div>
                            <div style="display: flex; gap: 0.5rem;">
                                <button onclick="approve(${s.id})" class="btn btn-primary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Approve</button>
                                <button onclick="reject(${s.id})" class="btn btn-secondary" style="padding: 0.4rem 0.8rem; font-size: 0.75rem;">Reject</button>
                            </div>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {}
        }

        async function approve(id) {
            await app.request(`/teacher/approve-student/${id}`, { method: 'POST' });
            app.showToast('Student Approved');
            loadPendingStudents();
        }

        async function reject(id) {
            await app.request(`/teacher/reject-student/${id}`, { method: 'POST' });
            app.showToast('Student Rejected');
            loadPendingStudents();
        }

        async function startSession() {
            const subject = document.getElementById('session-subject').value;
            if (!subject) return app.showToast('Enter subject name', 'danger');

            try {
                const res = await app.request('/teacher/start-session', {
                    method: 'POST',
                    body: JSON.stringify({ subject })
                });

                currentSessionId = res.sessionId;
                document.getElementById('qr-image').src = `data:image/png;base64,${res.qrCode}`;
                document.getElementById('display-token').innerText = res.qrToken;
                document.getElementById('active-subject').innerText = subject;
                document.getElementById('session-inactive').style.display = 'none';
                document.getElementById('session-active').style.display = 'block';

                app.showToast('Session Started');
                
                // Start polling for live count
                statsInterval = setInterval(updateLiveCount, 3000);
            } catch (err) {}
        }

        async function updateLiveCount() {
            if (!currentSessionId) return;
            try {
                const attList = await app.request(`/teacher/session/${currentSessionId}/attendance`);
                document.getElementById('live-count').innerText = attList.length;
            } catch (err) {}
        }

        async function endSession() {
            if (!currentSessionId) return;
            try {
                await app.request(`/teacher/end-session/${currentSessionId}`, { method: 'POST' });
                clearInterval(statsInterval);
                document.getElementById('session-inactive').style.display = 'block';
                document.getElementById('session-active').style.display = 'none';
                app.showToast('Session Ended');
                currentSessionId = null;
            } catch (err) {}
        }

        // Add dummy logic for PDF download in table if needed
    </script>
</body>
</html>
