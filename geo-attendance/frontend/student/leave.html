<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Leave — GeoAttend</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .form-group { margin-bottom: 16px; }
    .form-group label { display: block; margin-bottom: 6px; font-weight: 600; font-size: 0.9rem; }
    .form-group input, .form-group textarea { width: 100%; }
    .history-card { margin-top: 30px; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-wrapper">
  <div class="container">
    <div class="page-header">
      <h2>🏖️ Manage Leave</h2>
      <p>Submit a new leave request or view previous ones</p>
    </div>

    <div id="alertBox" class="alert hidden"></div>

    <div class="grid" style="grid-template-columns: 1fr 2fr; gap: 24px;">
      <!-- Apply for Leave -->
      <div class="card">
        <div class="card-header"><span class="card-title">Apply for Leave</span></div>
        <form id="leaveForm" onsubmit="submitLeave(event)">
          <div class="form-group">
            <label>Start Date</label>
            <input type="date" id="startDate" class="form-control" required />
          </div>
          <div class="form-group">
            <label>End Date</label>
            <input type="date" id="endDate" class="form-control" required />
          </div>
          <div class="form-group">
            <label>Reason</label>
            <textarea id="reason" class="form-control" rows="4" placeholder="Briefly describe your reason..." required></textarea>
          </div>
          <button type="submit" class="btn btn-primary" style="width: 100%" id="submitBtn">
            Submit Request
          </button>
        </form>
      </div>

      <!-- Leave History -->
      <div class="card">
        <div class="card-header"><span class="card-title">Leave History</span></div>
        <div class="table-wrapper">
          <table class="table">
            <thead>
              <tr>
                <th>Date Range</th>
                <th>Reason</th>
                <th>Status</th>
                <th>Remarks</th>
              </tr>
            </thead>
            <tbody id="leavesTable">
              <tr><td colspan="4" class="text-center text-muted" style="padding:28px">Loading...</td></tr>
            </tbody>
          </table>
        </div>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="../assets/js/main.js"></script>
<script>
  document.getElementById('navbar-placeholder').innerHTML = buildNavbar('STUDENT');
  document.getElementById('footer-placeholder').innerHTML = buildFooter();
  if (!initPage('STUDENT')) throw '';

  async function loadLeaves() {
    const res = await api.get('/student/leave/history');
    if (!res.ok) return;

    const leaves = res.data;
    const tbody = document.getElementById('leavesTable');
    if (!leaves.length) {
      tbody.innerHTML = `<tr><td colspan="4" class="text-center text-muted" style="padding:28px">No leave requests found.</td></tr>`;
      return;
    }

    tbody.innerHTML = leaves.map(l => {
      const start = UI.formatDate(l.startDate);
      const end = l.startDate === l.endDate ? '' : ` - ${UI.formatDate(l.endDate)}`;
      const remarks = l.adminRemarks || '-';
      return `
        <tr>
          <td style="white-space:nowrap">${start}${end}</td>
          <td>${l.reason}</td>
          <td>${UI.badgeStatus(l.status)}</td>
          <td>${remarks}</td>
        </tr>`;
    }).join('');
  }

  async function submitLeave(e) {
    e.preventDefault();
    const alertBox = document.getElementById('alertBox');
    const btn = document.getElementById('submitBtn');

    const startDate = document.getElementById('startDate').value;
    const endDate = document.getElementById('endDate').value;
    const reason = document.getElementById('reason').value;

    if (!startDate || !endDate || !reason) return;

    UI.setLoading(btn, true);
    const res = await api.post('/student/leave/apply', { startDate, endDate, reason });
    UI.setLoading(btn, false);

    if (res.ok) {
      UI.showAlert(alertBox, 'Leave application submitted successfully!', 'success');
      document.getElementById('leaveForm').reset();
      loadLeaves();
    } else {
      UI.showAlert(alertBox, res.data.message || 'Failed to submit leave', 'danger');
    }
  }

  loadLeaves();
</script>
</body>
</html>
