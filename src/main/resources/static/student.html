<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Student Dashboard | Geo-Attendance</title>
    <link rel="stylesheet" href="css/style.css">
    <script src="js/html5-qrcode.min.js"></script>
    <script src="js/app.js" defer></script>
</head>
<body>
    <div class="bg-blobs">
        <div class="blob blob-1"></div>
        <div class="blob blob-2"></div>
    </div>

    <div class="container">
        <nav class="navbar">
            <div class="logo">
                <span class="gradient-text">Student Portal</span>
            </div>
            <button class="hamburger">
                <span></span>
                <span></span>
                <span></span>
            </button>
            <div class="nav-menu">
                <div style="display: flex; align-items: center; gap: 1rem; flex-wrap: wrap; justify-content: center;">
                    <span id="nav-username" style="color: var(--text-muted); font-size: 0.9rem;">Student Name</span>
                    <button onclick="app.logout()" class="btn btn-logout">Logout</button>
                </div>
            </div>
        </nav>

        <div class="grid grid-2">
            <!-- Mark Attendance Section -->
            <div class="glass-card" style="text-align: center;">
                <h2>Mark Attendance</h2>
                <div style="margin: 2rem 0;">
                    <button id="btn-scan" class="btn btn-secondary" style="width: 100%; margin-bottom: 1rem; border-color: var(--primary);">
                        <span id="scan-btn-text">📷 Start Camera Scanner</span>
                    </button>
                    
                    <div id="reader" style="width: 100%; border-radius: 12px; overflow: hidden; margin-bottom: 2rem; border: 1px solid var(--glass-border); display: none;"></div>

                    <div id="scan-placeholder" style="padding: 2rem; border: 2px dashed var(--glass-border); border-radius: 24px; margin-bottom: 1.5rem;">
                        <img src="https://api.qrserver.com/v1/create-qr-code/?size=150x150&data=ScanMe" alt="Scan Icon" style="opacity: 0.3; filter: grayscale(1); width: 100px;">
                        <p style="color: var(--text-muted); margin-top: 1rem;">Connect to Teacher's Hotspot and scan the QR displayed on the screen.</p>
                    </div>

                    <div class="input-group">
                        <label>Enter QR Token (Manual Entry)</label>
                        <input type="text" id="qr-token-input" placeholder="Paste or type the token here">
                    </div>

                    <button id="btn-mark" class="btn btn-primary" style="width: 100%; padding: 1rem;">
                        <span>Submit Attendance</span>
                        <div class="loader" id="mark-loader"></div>
                    </button>
                </div>
                
                <div id="status-display" style="padding: 1rem; border-radius: 12px; display: none;">
                    <!-- Success/Error message -->
                </div>
            </div>

            <!-- Student Info & History -->
            <div class="glass-card">
                <h2>My History</h2>
                <p style="color: var(--text-muted); font-size: 0.9rem; margin-bottom: 1.5rem;">View your marked attendance records.</p>
                
                <div id="history-list" style="max-height: 400px; overflow-y: auto;">
                    <!-- List items loaded here -->
                </div>
            </div>
        </div>
    </div>

    <div id="toast"></div>

    <script>
        let html5QrCode = null;

        document.addEventListener('DOMContentLoaded', () => {
            if (!app.user || !app.user.roles.includes('ROLE_STUDENT')) {
                window.location.href = 'auth.html';
            }
            loadHistory();

            document.getElementById('btn-mark').onclick = markAttendance;
            document.getElementById('btn-scan').onclick = toggleScanner;
        });

        async function toggleScanner() {
            const readerDiv = document.getElementById('reader');
            const placeholder = document.getElementById('scan-placeholder');
            const btnText = document.getElementById('scan-btn-text');

            if (!html5QrCode) {
                html5QrCode = new Html5Qrcode("reader");
            }

            if (readerDiv.style.display === 'none') {
                // Start scanning
                readerDiv.style.display = 'block';
                placeholder.style.display = 'none';
                btnText.innerText = "🛑 Stop Camera";
                
                try {
                    await html5QrCode.start(
                        { facingMode: "environment" }, 
                        { fps: 10, qrbox: { width: 250, height: 250 } },
                        (decodedText) => {
                            document.getElementById('qr-token-input').value = decodedText;
                            app.showToast('QR Scanned! Tap Submit.');
                            toggleScanner(); // Stop scanning after success
                        },
                        (errorMessage) => {}
                    );
                } catch (err) {
                    app.showToast('Camera Permission Denied or Not Found', 'danger');
                    readerDiv.style.display = 'none';
                    placeholder.style.display = 'block';
                    btnText.innerText = "📷 Start Camera Scanner";
                }
            } else {
                // Stop scanning
                if (html5QrCode) {
                    await html5QrCode.stop();
                }
                readerDiv.style.display = 'none';
                placeholder.style.display = 'block';
                btnText.innerText = "📷 Start Camera Scanner";
            }
        }

        async function markAttendance() {
            const token = document.getElementById('qr-token-input').value;
            if (!token) return app.showToast('Please enter the QR token', 'danger');

            const loader = document.getElementById('mark-loader');
            const statusBox = document.getElementById('status-display');
            
            loader.style.display = 'inline-block';
            statusBox.style.display = 'none';

            try {
                const res = await app.request('/student/mark-attendance', {
                    method: 'POST',
                    body: JSON.stringify({ qrToken: token })
                });

                statusBox.style.display = 'block';
                statusBox.style.backgroundColor = 'rgba(16, 185, 129, 0.1)';
                statusBox.style.color = 'var(--accent)';
                statusBox.innerText = res.message;
                
                app.showToast('Attendance Marked! ✅');
                loadHistory();
            } catch (err) {
                statusBox.style.display = 'block';
                statusBox.style.backgroundColor = 'rgba(239, 68, 68, 0.1)';
                statusBox.style.color = 'var(--secondary)';
                statusBox.innerText = err.message;
            } finally {
                loader.style.display = 'none';
            }
        }

        async function loadHistory() {
            const list = document.getElementById('history-list');
            try {
                const history = await app.request('/student/history');
                if (history.length === 0) {
                    list.innerHTML = '<p style="text-align: center; color: var(--text-muted); padding: 2rem;">No attendance marked yet.</p>';
                    return;
                }
                list.innerHTML = '';
                history.forEach(h => {
                    const div = document.createElement('div');
                    div.className = 'glass-card';
                    div.style.padding = '1rem';
                    div.style.marginBottom = '0.5rem';
                    div.style.background = 'rgba(255,255,255,0.03)';
                    div.innerHTML = `
                        <div style="display: flex; justify-content: space-between; align-items: center;">
                            <div>
                                <h4 style="margin: 0;">${h.session.subject}</h4>
                                <small style="color: var(--text-muted)">${new Date(h.markedAt).toLocaleDateString()} at ${new Date(h.markedAt).toLocaleTimeString()}</small>
                            </div>
                            <span class="badge badge-success">Present</span>
                        </div>
                    `;
                    list.appendChild(div);
                });
            } catch (err) {}
        }
    </script>
</body>
</html>
