<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Manage Students — GeoAttend</title>
  <link rel="stylesheet" href="../assets/css/style.css" />
  <style>
    .tabs { display: flex; gap: 8px; margin-bottom: 20px; flex-wrap: wrap; }
    .tab-btn {
      padding: 8px 20px; border-radius: 8px; font-size: 0.88rem;
      font-weight: 600; cursor: pointer; border: 1.5px solid var(--border);
      background: #fff; color: var(--text-muted); transition: all 0.18s;
      font-family: 'DM Sans', sans-serif;
    }
    .tab-btn.active { background: var(--primary); color: #fff; border-color: var(--primary); }
    .search-bar { position: relative; max-width: 320px; }
    .search-bar input { padding-left: 36px; }
    .search-bar::before {
      content: '🔍'; position: absolute; left: 10px; top: 50%;
      transform: translateY(-50%); font-size: 0.85rem; pointer-events: none;
    }
    .action-btns { display: flex; gap: 6px; }
    .student-avatar {
      width: 34px; height: 34px; border-radius: 50%;
      background: linear-gradient(135deg, var(--primary), var(--accent));
      display: inline-flex; align-items: center; justify-content: center;
      color: #fff; font-weight: 700; font-size: 0.85rem; margin-right: 8px;
    }
    #alertBox { margin-bottom: 16px; }
  </style>
</head>
<body>

<div id="navbar-placeholder"></div>

<div class="page-wrapper">
  <div class="container">
    <div class="page-header">
      <h2>👥 Manage Students</h2>
      <p>Approve, reject and view all registered students</p>
    </div>

    <div id="alertBox" class="alert hidden"></div>

    <div class="card">
      <div class="card-header">
        <div class="tabs">
          <button class="tab-btn active" onclick="switchTab('all', this)">All Students</button>
          <button class="tab-btn" onclick="switchTab('pending', this)">⏳ Pending</button>
          <button class="tab-btn" onclick="switchTab('approved', this)">✅ Approved</button>
          <button class="tab-btn" onclick="switchTab('rejected', this)">❌ Rejected</button>
        </div>
        <div class="search-bar">
          <input type="text" id="searchInput" class="form-control" placeholder="Search students..." oninput="filterTable()" />
        </div>
      </div>

      <div class="table-wrapper">
        <table class="table">
          <thead>
            <tr>
              <th>#</th>
              <th>Student</th>
              <th>Email</th>
              <th>Student ID</th>
              <th>Phone</th>
              <th>Registered</th>
              <th>Status</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="studentsTable">
            <tr><td colspan="8" class="text-center text-muted" style="padding:28px">Loading...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<div id="footer-placeholder"></div>

<script src="../assets/js/main.js"></script>
<script>
  document.getElementById('navbar-placeholder').innerHTML = buildNavbar('ADMIN');
  document.getElementById('footer-placeholder').innerHTML = buildFooter();
  if (!initPage('ADMIN')) throw '';

  let allStudents = [];
  let currentTab  = 'all';

  async function loadStudents() {
    const res = await api.get('/admin/students');
    if (!res.ok) { allStudents = []; renderTable([]); return; }
    allStudents = res.data;
    renderTable(allStudents);
  }

  function switchTab(tab, btn) {
    currentTab = tab;
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    filterTable();
  }

  function filterTable() {
    const q = document.getElementById('searchInput').value.toLowerCase();
    let filtered = allStudents;

    if (currentTab !== 'all') filtered = filtered.filter(s => s.status === currentTab);
    if (q) filtered = filtered.filter(s =>
      s.name.toLowerCase().includes(q) ||
      s.email.toLowerCase().includes(q) ||
      s.studentId.toLowerCase().includes(q)
    );
    renderTable(filtered);
  }

  function renderTable(students) {
    const tbody = document.getElementById('studentsTable');
    if (!students.length) {
      tbody.innerHTML = `<tr><td colspan="8" class="text-center text-muted" style="padding:28px">No students found</td></tr>`;
      return;
    }
    tbody.innerHTML = students.map((s, i) => {
      const initials = s.name.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase();
      const date = s.createdAt ? UI.formatDate(s.createdAt.split('T')[0]) : '-';
      const actions = s.status === 'pending' ? `
        <div class="action-btns">
          <button class="btn btn-success btn-sm" onclick="updateStatus(${s.id}, 'approved')">✅ Approve</button>
          <button class="btn btn-danger btn-sm"  onclick="updateStatus(${s.id}, 'rejected')">❌ Reject</button>
        </div>` :
        s.status === 'approved' ? `
        <div class="action-btns">
          <button class="btn btn-danger btn-sm" onclick="updateStatus(${s.id}, 'rejected')">❌ Reject</button>
        </div>` : `
        <div class="action-btns">
          <button class="btn btn-success btn-sm" onclick="updateStatus(${s.id}, 'approved')">✅ Re-Approve</button>
        </div>`;
      return `
        <tr>
          <td>${i + 1}</td>
          <td style="white-space:nowrap">
            <span class="student-avatar">${initials}</span>${s.name}
          </td>
          <td>${s.email}</td>
          <td><code>${s.studentId}</code></td>
          <td>${s.phone || '—'}</td>
          <td>${date}</td>
          <td>${UI.badgeStatus(s.status)}</td>
          <td>${actions}</td>
        </tr>`;
    }).join('');
  }

  async function updateStatus(id, status) {
    const alertBox = document.getElementById('alertBox');
    const res = await api.put(`/admin/students/${id}/status`, { status });
    if (res.ok) {
      UI.showAlert(alertBox, `Student ${status} successfully!`, 'success');
      loadStudents();
    } else {
      UI.showAlert(alertBox, res.data.message || 'Update failed', 'danger');
    }
  }

  loadStudents();
</script>
</body>
</html>
